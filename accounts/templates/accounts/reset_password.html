{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md fade-in">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-800 overflow-hidden">
      <div class="bg-gradient-to-r from-orange-500 to-amber-500 px-8 py-8 text-center">
        <div class="text-4xl mb-2">🔏</div>
        <h1 class="text-2xl font-bold text-white">Set New Password</h1>
      </div>
      <div class="p-8">
        <form method="POST">
          {% csrf_token %}
          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">New Password</label>
              {{ form.password1 }}
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Confirm Password</label>
              {{ form.password2 }}
              {% if form.password2.errors %}<p class="mt-1 text-xs text-red-500">{{ form.password2.errors|join:", " }}</p>{% endif %}
            </div>
            <button type="submit" class="w-full py-3 px-4 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-lg transition">
              Reset Password
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
