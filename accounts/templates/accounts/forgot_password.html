{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md fade-in">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-800 overflow-hidden">
      <div class="bg-gradient-to-r from-orange-500 to-amber-500 px-8 py-8 text-center">
        <div class="text-4xl mb-2">🔓</div>
        <h1 class="text-2xl font-bold text-white">Forgot Password</h1>
        <p class="text-orange-100 text-sm mt-1">We'll send a reset link to your email</p>
      </div>
      <div class="p-8">
        <form method="POST">
          {% csrf_token %}
          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
              {{ form.email }}
            </div>
            <button type="submit" class="w-full py-3 px-4 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-lg transition">
              Send Reset Link
            </button>
          </div>
        </form>
        <p class="mt-6 text-center text-sm text-gray-500">
          <a href="{% url 'login' %}" class="text-indigo-600 dark:text-indigo-400 hover:underline">← Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
